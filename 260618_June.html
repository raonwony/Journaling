<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유월의 기록 정거장 - 일랑 작업소</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #faf7f5;
            color: #544d47;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(160, 140, 130, 0.06);
        }

        .header h1 {
            font-size: 19px;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: #3d3630;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 13.5px;
            color: #8c8075;
            margin: 0 0 35px 0;
            line-height: 1.5;
        }

        /* 잉크병 컨테이너 */
        .ink-bottle-container {
            position: relative;
            width: 160px;
            height: 200px;
            margin: 0 auto 35px auto;
        }

        /* 유리병 외곽 테두리선 */
        .bottle {
            position: absolute;
            top: 0;
            left: 0;
            width: 160px;
            height: 200px;
            border: 2.5px solid #e2d9cf;
            border-radius: 35px 35px 25px 25px;
            z-index: 3;
            pointer-events: none;
            background: transparent;
        }

        /* 병 주둥이 */
        .bottle::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 12px;
            border: 2.5px solid #e2d9cf;
            border-bottom: none;
            border-radius: 5px 5px 0 0;
            background: #ffffff;
        }

        /* 캔버스 공간 공간 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 160px;
            height: 200px;
            border-radius: 35px 35px 25px 25px;
            z-index: 1;
        }

        /* 반짝임 레이어 */
        .sparkle-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
        }

        .sparkle {
            position: absolute;
            width: 11px;
            height: 11px;
            background: #ffffff;
            clip-path: polygon(50% 0%, 63% 37%, 100% 37%, 70% 60%, 81% 97%, 50% 75%, 19% 97%, 30% 60%, 0% 37%, 37% 37%);
            opacity: 0;
            transform: scale(0);
        }

        @keyframes popSparkle {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* 슬라이더 디자인 */
        .slider-container {
            width: 100%;
            padding: 0 10px;
            margin-bottom: 30px;
        }

        .range-value {
            font-size: 14px;
            font-weight: 600;
            color: #aa9685;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 5px;
            cursor: pointer;
            background: #eadecf;
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #f7cbd9; /* 기본 핑크 */
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6.5px;
            box-shadow: 0 2px 6px rgba(247, 203, 217, 0.5);
            transition: transform 0.1s, background-color 0.2s;
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.25);
        }

        /* 메시지 박스 */
        .message-box {
            min-height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background-color: #faf7f5;
            border-radius: 16px;
            font-size: 13.5px;
            line-height: 1.6;
            color: #5d534a;
            word-break: keep-all;
            transition: background-color 0.4s ease, color 0.3s ease;
        }

        .fade-in {
            animation: fadeInText 0.4s forwards;
        }

        @keyframes fadeInText {
            from { opacity: 0; transform: translateY(3px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-footer {
            margin-top: 25px;
            font-size: 10.5px;
            color: #baa390;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>유월의 기록 정거장</h1>
        <p>오늘 내 마음의 수위는 어느 정도인가요?<br>슬라이더를 움직여 노을빛 잉크를 채워보세요.</p>
    </div>

    <div class="ink-bottle-container">
        <div class="bottle"></div>
        <canvas id="inkCanvas" width="160" height="200"></canvas>
        
        <div class="sparkle-layer" id="sparkleLayer">
            <div class="sparkle" style="top:25%; left:25%;"></div>
            <div class="sparkle" style="top:45%; left:68%;"></div>
            <div class="sparkle" style="top:20%; left:60%;"></div>
            <div class="sparkle" style="top:65%; left:20%;"></div>
            <div class="sparkle" style="top:55%; left:52%;"></div>
        </div>
    </div>

    <div class="slider-container">
        <div class="range-value">오늘의 에너지 레벨 : <span id="levelNum">0</span></div>
        <input type="range" id="inkSlider" min="0" max="10" value="0" step="1">
    </div>

    <div class="message-box" id="messageBox">
        슬라이더를 움직여 오늘의 에너지를 측정해 주세요.
    </div>

    <div class="brand-footer">ILANG ATELIER</div>
</div>

<script>
    const canvas = document.getElementById('inkCanvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('inkSlider');
    const levelNum = document.getElementById('levelNum');
    const messageBox = document.getElementById('messageBox');
    const sparkles = document.querySelectorAll('.sparkle');

    // 수위 데이터 및 스타일 매칭
    const dataMap = {
        0: { msg: "슬라이더를 움직여 오늘의 에너지를 측정해 주세요.", bg: "#faf7f5", text: "#5d534a" },
        1: { msg: "마음에 잔잔한 밤이 찾아오는 중. 오늘은 일기장을 완전히 덮고 노을빛 꿈을 꾸며 푹 쉬자.", bg: "#f3effa", text: "#61557a" },
        2: { msg: "마음에 잔잔한 밤이 찾아오는 중. 오늘은 일기장을 완전히 덮고 노을빛 꿈을 꾸며 푹 쉬자.", bg: "#f3effa", text: "#61557a" },
        3: { msg: "마음에 잔잔한 밤이 찾아오는 중. 오늘은 일기장을 완전히 덮고 노을빛 꿈을 꾸며 푹 쉬자.", bg: "#f3effa", text: "#61557a" },
        4: { msg: "하늘이 예쁘게 물드는 딱 그만큼의 하루. 오늘 밤엔 예쁜 단어 세 개만 툭 적어두고 쉴까?", bg: "#fff0f3", text: "#855866" },
        5: { msg: "하늘이 예쁘게 물드는 딱 그만큼의 하루. 오늘 밤엔 예쁜 단어 세 개만 툭 적어두고 쉴까?", bg: "#fff0f3", text: "#855866" },
        6: { msg: "하늘이 예쁘게 물드는 딱 그만큼의 하루. 오늘 밤엔 예쁜 단어 세 개만 툭 적어두고 쉴까?", bg: "#fff0f3", text: "#855866" },
        7: { msg: "하늘이 예쁘게 물드는 딱 그만큼의 하루. 오늘 밤엔 예쁜 단어 세 개만 툭 적어두고 쉴까?", bg: "#fff0f3", text: "#855866" },
        8: { msg: "반짝이는 노을 에너지가 가득 찬 날! 오늘 일기장에는 기분 좋은 사각거림이 가득하겠다.", bg: "#fff0e6", text: "#825c43" },
        9: { msg: "반짝이는 노을 에너지가 가득 찬 날! 오늘 일기장에는 기분 좋은 사각거림이 가득하겠다.", bg: "#fff0e6", text: "#825c43" },
        10: { msg: "반짝이는 노을 에너지가 가득 찬 날! 오늘 일기장에는 기분 좋은 사각거림이 가득하겠다.", bg: "#fff0e6", text: "#825c43" }
    };

    let currentHeight = 0; 
    let targetHeight = 0;  
    let waveAngle = 0;     
    let isMoving = false;  
    let debounceTimeout;

    // 구형 브라우저 완벽 호환용 라운드 패스 수동 드로잉 함수 생성
    function drawRoundedRectPath(x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (Math.abs(currentHeight - targetHeight) > 0.1) {
            currentHeight += (targetHeight - currentHeight) * 0.12;
        } else {
            currentHeight = targetHeight;
        }

        if (isMoving || Math.abs(currentHeight - targetHeight) > 0.5) {
            waveAngle += 0.08;
        } else {
            waveAngle += 0.03;
        }

        if (currentHeight > 0) {
            ctx.save();
            
            // 신형 roundRect 대신 완벽히 호환되는 함수로 클리핑 처리
            drawRoundedRectPath(0, 0, canvas.width, canvas.height, 30);
            ctx.clip();

            ctx.beginPath();
            const baseLine = canvas.height - currentHeight;
            const amplitude = isMoving ? 5 : Math.min(2, currentHeight * 0.05);

            ctx.moveTo(0, canvas.height);
            for (let x = 0; x <= canvas.width; x++) {
                const y = baseLine + Math.sin(x * 0.04 + waveAngle) * amplitude;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.closePath();

            const grad = ctx.createLinearGradient(0, canvas.height, 0, baseLine);
            grad.addColorStop(0, 'rgba(220, 198, 242, 0.55)'); // 연하고 말간 보라
            grad.addColorStop(1, 'rgba(255, 204, 221, 0.55)'); // 연하고 말간 핑크
            
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.restore();
        }

        requestAnimationFrame(draw);
    }

    draw();

    slider.addEventListener('input', (e) => {
        const val = parseInt(e.target.value);
        levelNum.innerText = val;
        isMoving = true;

        let calcHeight = (val / 10) * canvas.height;
        if (val > 0) calcHeight = Math.min(calcHeight + 6, canvas.height - 8);
        if (val === 0) calcHeight = 0;
        
        targetHeight = calcHeight;

        clearTimeout(debounceTimeout);
        debounceTimeout = setTimeout(() => {
            isMoving = false;
            
            messageBox.classList.remove('fade-in');
            void messageBox.offsetWidth;
            
            messageBox.innerText = dataMap[val].msg;
            messageBox.style.backgroundColor = dataMap[val].bg;
            messageBox.style.color = dataMap[val].text;
            
            messageBox.classList.add('fade-in');

            if (val > 0) {
                sparkles.forEach((sparkle, idx) => {
                    sparkle.style.animation = 'none';
                    void sparkle.offsetWidth;
                    sparkle.style.animation = `popSparkle 0.55s ${idx * 0.08}s ease-in-out forwards`;
                });
            }
        }, 180);
    });
</script>

</body>
</html>
